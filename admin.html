<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — IBF 100 Dias</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #f5f3ef;
      --white:     #ffffff;
      --black:     #0a0a0a;
      --border:    #e0ddd8;
      --text:      #0a0a0a;
      --text-sec:  #4a4744;
      --text-mut:  #a8a5a0;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      padding-bottom: 80px;
    }

    /* ===== HEADER ===== */
    header {
      background: var(--black);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .hdr {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .hdr-eyebrow {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: rgba(255,255,255,0.3);
      display: block;
      margin-bottom: 2px;
    }

    .hdr-title {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.01em;
    }

    .hdr-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-save {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      background: #fff;
      color: var(--black);
      border: none;
      padding: 8px 18px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-save:hover    { opacity: 0.85; }
    .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-logout {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      background: transparent;
      color: rgba(255,255,255,0.4);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 7px 13px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-logout:hover { color: #fff; border-color: rgba(255,255,255,0.35); }

    .save-msg {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      white-space: nowrap;
    }

    /* ===== PAGE ===== */
    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 24px 0;
    }

    /* ===== SECTION ===== */
    .section { margin-bottom: 56px; }

    .sec-eyebrow {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--text-mut);
      margin-bottom: 6px;
    }

    .sec-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.015em;
      margin-bottom: 20px;
    }

    /* ===== CARDS ===== */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      padding: 24px;
      margin-bottom: 12px;
    }

    /* ===== FORM ELEMENTS ===== */
    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }

    .f-label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-mut);
      margin-bottom: 5px;
    }

    input[type="text"],
    input[type="url"],
    select,
    textarea {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--white);
      border: 1px solid var(--border);
      padding: 8px 12px;
      width: 100%;
      outline: none;
      border-radius: 0;
      -webkit-appearance: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus,
    input[type="url"]:focus,
    select:focus,
    textarea:focus { border-color: var(--text); }

    textarea { resize: vertical; line-height: 1.6; }

    /* ===== PHASE ===== */
    .phase-card {
      background: var(--white);
      border: 1px solid var(--border);
      padding: 24px;
      margin-bottom: 24px;
    }

    .phase-hdr {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    .phase-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 3px;
    }

    .phase-period {
      font-size: 12px;
      color: var(--text-mut);
    }

    /* ===== MILESTONE ===== */
    .ms-card {
      border: 1px solid var(--border);
      border-left: 3px solid var(--border);
      padding: 18px;
      margin-bottom: 8px;
      background: var(--white);
    }
    .ms-card.s-done     { border-left-color: var(--black); }
    .ms-card.s-active   { border-left-color: var(--text-sec); }
    .ms-card.s-upcoming { border-left-color: var(--border); }

    .ms-top {
      display: grid;
      grid-template-columns: 1fr 160px;
      gap: 12px;
      margin-bottom: 14px;
    }

    /* ===== MD PAIR ===== */
    .sec-lbl {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--text-mut);
      margin-bottom: 8px;
    }

    .sec-lbl span {
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      font-size: 10px;
    }

    .md-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .md-preview {
      font-size: 13px;
      line-height: 1.7;
      color: var(--text-sec);
      border: 1px solid var(--border);
      padding: 8px 12px;
      background: var(--bg);
      min-height: 90px;
      overflow-y: auto;
    }

    .md-preview p            { margin: 0 0 8px; }
    .md-preview p:last-child { margin-bottom: 0; }
    .md-preview ul           { padding-left: 16px; margin: 0 0 8px; }
    .md-preview li           { margin-bottom: 3px; }
    .md-preview strong       { font-weight: 600; color: var(--text); }
    .md-preview h1, .md-preview h2, .md-preview h3 {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text); margin: 10px 0 5px;
    }
    .md-empty { color: var(--text-mut); font-style: italic; font-size: 13px; }

    /* ===== ARTIFACT ===== */
    .artifact-wrap {
      border: 1px solid var(--border);
      padding: 16px;
      margin-top: 6px;
    }

    .artifact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    /* ===== UPDATES ===== */
    .update-row {
      display: grid;
      grid-template-columns: 130px 1fr auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }

    /* ===== DIVIDER ===== */
    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 18px 0;
    }

    /* ===== BUTTONS ===== */
    .btn {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 7px 14px;
      cursor: pointer;
      border-radius: 0;
      transition: opacity 0.15s;
      display: inline-block;
    }
    .btn:hover { opacity: 0.72; }

    .btn-pri  { background: var(--black); color: #fff; border: none; }
    .btn-sec  { background: transparent; color: var(--text-sec); border: 1px solid var(--border); }
    .btn-del  { background: transparent; color: var(--text-mut); border: 1px solid var(--border); }
    .btn-txt  {
      background: none; border: none; color: var(--text-mut);
      font-family: 'Inter', sans-serif; font-size: 12px;
      cursor: pointer; text-decoration: underline; padding: 0;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 580px) {
      .md-pair      { grid-template-columns: 1fr; }
      .ms-top       { grid-template-columns: 1fr; }
      .artifact-grid{ grid-template-columns: 1fr; }
      .update-row   { grid-template-columns: 100px 1fr auto; }
    }
  </style>
</head>
<body>

<header>
  <div class="hdr">
    <div>
      <span class="hdr-eyebrow">— IBF · Diretoria de Receita · Admin</span>
      <span class="hdr-title">Editar plano</span>
    </div>
    <div class="hdr-actions">
      <span class="save-msg" id="save-msg"></span>
      <button class="btn-logout" onclick="doLogout()">Sair</button>
      <button class="btn-save" id="btn-save" onclick="saveData()">Salvar tudo</button>
    </div>
  </div>
</header>

<main class="page" id="main">
  <p style="color:var(--text-mut);padding-top:40px;font-size:14px">Carregando...</p>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  var currentData = null;

  /* ---- Utils ---- */
  function esc(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g,  '&amp;')
      .replace(/</g,  '&lt;')
      .replace(/>/g,  '&gt;')
      .replace(/"/g,  '&quot;');
  }

  function showMsg(txt) {
    var el = document.getElementById('save-msg');
    el.textContent = txt;
    setTimeout(function () { el.textContent = ''; }, 3000);
  }

  function updatePreview(id, text) {
    var el = document.getElementById(id);
    if (!el) return;
    if (text && text.trim()) {
      el.innerHTML = marked.parse(text);
      el.classList.remove('md-empty');
    } else {
      el.innerHTML = '<em>Pré-visualização</em>';
      el.classList.add('md-empty');
    }
  }

  function formatToday() {
    var d = new Date();
    var mo = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
    return d.getDate() + ' ' + mo[d.getMonth()] + ' ' + d.getFullYear();
  }

  /* ---- Setters ---- */
  function setPhaseStatus(pi, val) {
    currentData.phases[pi].status = val;
  }

  function setMs(pi, mi, field, val) {
    currentData.phases[pi].milestones[mi][field] = val;
  }

  function setMsContent(pi, mi, field, val) {
    currentData.phases[pi].milestones[mi][field] = val.trim() || null;
    updatePreview('prv-' + field + '-' + pi + '-' + mi, val);
  }

  function setArt(pi, mi, field, val) {
    var art = currentData.phases[pi].milestones[mi].artifact;
    if (art) art[field] = val;
  }

  function toggleArtifact(pi, mi) {
    var m = currentData.phases[pi].milestones[mi];
    m.artifact = m.artifact
      ? null
      : { type: 'DOCUMENTO', name: '', date: '', link: '' };
    renderAll();
  }

  /* ---- Updates ---- */
  function addUpdate() {
    currentData.updates.unshift({ date: formatToday(), text: '' });
    renderAll();
  }

  function removeUpdate(i) {
    currentData.updates.splice(i, 1);
    renderAll();
  }

  function setUpdate(i, field, val) {
    currentData.updates[i][field] = val;
  }

  /* ---- Render ---- */
  function renderAll() {
    document.getElementById('main').innerHTML =
      renderUpdates() + renderPhases();

    // Inicializa previews após injeção no DOM
    currentData.phases.forEach(function (ph, pi) {
      ph.milestones.forEach(function (m, mi) {
        updatePreview('prv-content-'          + pi + '-' + mi, m.content);
        updatePreview('prv-expected_outcome-' + pi + '-' + mi, m.expected_outcome);
      });
    });
  }

  function renderUpdates() {
    var rows = currentData.updates.map(function (u, i) {
      return '<div class="update-row">' +
        '<input type="text" value="' + esc(u.date) + '" placeholder="Data" ' +
          'oninput="setUpdate(' + i + ',\'date\',this.value)">' +
        '<input type="text" value="' + esc(u.text) + '" placeholder="Texto do update" ' +
          'oninput="setUpdate(' + i + ',\'text\',this.value)">' +
        '<button class="btn btn-del" onclick="removeUpdate(' + i + ')">Remover</button>' +
      '</div>';
    }).join('');

    return '<section class="section">' +
      '<p class="sec-eyebrow">— Feed</p>' +
      '<h2 class="sec-title">Últimas movimentações</h2>' +
      '<div class="card">' +
        rows +
        '<div style="margin-top:12px">' +
          '<button class="btn btn-sec" onclick="addUpdate()">+ Adicionar update</button>' +
        '</div>' +
      '</div>' +
    '</section>';
  }

  function renderPhases() {
    return '<section class="section">' +
      '<p class="sec-eyebrow">— Cronograma</p>' +
      '<h2 class="sec-title">Fases e Milestones</h2>' +
      currentData.phases.map(function (ph, pi) {
        return renderPhase(ph, pi);
      }).join('') +
    '</section>';
  }

  function renderPhase(ph, pi) {
    var statusOpts = statusOptions(ph.status, false);

    var milestones = ph.milestones.map(function (m, mi) {
      return renderMilestone(m, pi, mi);
    }).join('');

    return '<div class="phase-card">' +
      '<div class="phase-hdr">' +
        '<div>' +
          '<div class="phase-name">' + esc(ph.number) + ' — ' + esc(ph.name) + '</div>' +
          '<div class="phase-period">' + esc(ph.period) + ' · ' + esc(ph.dates) + '</div>' +
        '</div>' +
        '<div style="min-width:160px">' +
          '<label class="f-label">Status da fase</label>' +
          '<select onchange="setPhaseStatus(' + pi + ',this.value)">' + statusOpts + '</select>' +
        '</div>' +
      '</div>' +
      milestones +
    '</div>';
  }

  function statusOptions(current) {
    return [
      { v: 'upcoming', l: 'A iniciar' },
      { v: 'active',   l: 'Em andamento' },
      { v: 'done',     l: 'Concluído' }
    ].map(function (o) {
      return '<option value="' + o.v + '"' + (current === o.v ? ' selected' : '') + '>' + o.l + '</option>';
    }).join('');
  }

  function renderMilestone(m, pi, mi) {
    var cId = 'prv-content-'          + pi + '-' + mi;
    var oId = 'prv-expected_outcome-' + pi + '-' + mi;

    /* Artifact block */
    var artHtml;
    if (m.artifact) {
      var typeOpts = ['DOCUMENTO','ORGANOGRAMA','APRESENTAÇÃO','DASHBOARD'].map(function (t) {
        return '<option value="' + t + '"' + (m.artifact.type === t ? ' selected' : '') + '>' + t + '</option>';
      }).join('');

      artHtml =
        '<div class="artifact-wrap">' +
          '<div class="artifact-grid">' +
            '<div class="field" style="margin:0">' +
              '<label class="f-label">Tipo</label>' +
              '<select onchange="setArt(' + pi + ',' + mi + ',\'type\',this.value)">' + typeOpts + '</select>' +
            '</div>' +
            '<div class="field" style="margin:0">' +
              '<label class="f-label">Data</label>' +
              '<input type="text" value="' + esc(m.artifact.date) + '" placeholder="ex: 14 abr 2026" ' +
                'oninput="setArt(' + pi + ',' + mi + ',\'date\',this.value)">' +
            '</div>' +
          '</div>' +
          '<div class="field">' +
            '<label class="f-label">Nome</label>' +
            '<input type="text" value="' + esc(m.artifact.name) + '" placeholder="Nome do artefato" ' +
              'oninput="setArt(' + pi + ',' + mi + ',\'name\',this.value)">' +
          '</div>' +
          '<div class="field" style="margin-bottom:12px">' +
            '<label class="f-label">Link</label>' +
            '<input type="url" value="' + esc(m.artifact.link) + '" placeholder="https://..." ' +
              'oninput="setArt(' + pi + ',' + mi + ',\'link\',this.value)">' +
          '</div>' +
          '<button class="btn-txt" onclick="toggleArtifact(' + pi + ',' + mi + ')">Remover artefato</button>' +
        '</div>';
    } else {
      artHtml = '<button class="btn btn-sec" onclick="toggleArtifact(' + pi + ',' + mi + ')">+ Adicionar artefato</button>';
    }

    return '<div class="ms-card s-' + m.status + '">' +

      /* Nome + status */
      '<div class="ms-top">' +
        '<div class="field" style="margin:0">' +
          '<label class="f-label">Nome</label>' +
          '<input type="text" value="' + esc(m.name) + '" ' +
            'oninput="setMs(' + pi + ',' + mi + ',\'name\',this.value)">' +
        '</div>' +
        '<div class="field" style="margin:0">' +
          '<label class="f-label">Status</label>' +
          '<select onchange="setMs(' + pi + ',' + mi + ',\'status\',this.value)">' + statusOptions(m.status) + '</select>' +
        '</div>' +
      '</div>' +

      /* Descrição + data */
      '<div class="field">' +
        '<label class="f-label">Descrição curta</label>' +
        '<input type="text" value="' + esc(m.description) + '" ' +
          'oninput="setMs(' + pi + ',' + mi + ',\'description\',this.value)">' +
      '</div>' +
      '<div class="field">' +
        '<label class="f-label">Data prevista</label>' +
        '<input type="text" value="' + esc(m.due_date) + '" style="max-width:200px" ' +
          'oninput="setMs(' + pi + ',' + mi + ',\'due_date\',this.value)">' +
      '</div>' +

      '<hr>' +

      /* Content */
      '<p class="sec-lbl">— O que foi feito <span>(aparece em done · active)</span></p>' +
      '<div class="md-pair">' +
        '<textarea rows="6" placeholder="Cole o conteúdo do ClickUp em Markdown..." ' +
          'oninput="setMsContent(' + pi + ',' + mi + ',\'content\',this.value)">' +
          esc(m.content || '') +
        '</textarea>' +
        '<div class="md-preview md-empty" id="' + cId + '"><em>Pré-visualização</em></div>' +
      '</div>' +

      '<hr>' +

      /* Expected outcome */
      '<p class="sec-lbl">— O que está por vir <span>(aparece em upcoming · active)</span></p>' +
      '<div class="md-pair">' +
        '<textarea rows="4" placeholder="O que a Diretoria pode esperar desta entrega..." ' +
          'oninput="setMsContent(' + pi + ',' + mi + ',\'expected_outcome\',this.value)">' +
          esc(m.expected_outcome || '') +
        '</textarea>' +
        '<div class="md-preview md-empty" id="' + oId + '"><em>Pré-visualização</em></div>' +
      '</div>' +

      '<hr>' +

      /* Artifact */
      '<p class="sec-lbl">— Artefato</p>' +
      artHtml +

    '</div>';
  }

  /* ---- Load ---- */
  async function loadData() {
    try {
      var res = await fetch('/api/data');
      if (res.status === 401) { window.location.href = '/login'; return; }
      if (!res.ok) throw new Error();
      currentData = await res.json();
      renderAll();
    } catch (e) {
      document.getElementById('main').innerHTML =
        '<p style="color:var(--text-mut);padding-top:40px;font-size:14px">Erro ao carregar dados.</p>';
    }
  }

  /* ---- Save ---- */
  async function saveData() {
    var btn = document.getElementById('btn-save');
    btn.disabled = true;
    showMsg('Salvando...');
    try {
      var res = await fetch('/api/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(currentData)
      });
      if (res.ok)              { showMsg('Salvo.'); }
      else if (res.status === 401) { window.location.href = '/login'; }
      else                     { showMsg('Erro ao salvar.'); }
    } catch (e) {
      showMsg('Erro de conexão.');
    } finally {
      btn.disabled = false;
    }
  }

  /* ---- Logout ---- */
  async function doLogout() {
    await fetch('/api/logout', { method: 'POST' });
    window.location.href = '/login';
  }

  loadData();
</script>
</body>
</html>
